<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-primary min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg p-4 rounded-4 animate-fade-in">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Alke Wallet</h2>
                            <p class="text-muted">Inicia sesión de forma segura</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="user@alke.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                            </div>
                            <div id="loginAlert" class="alert alert-danger d-none mb-3 small" role="alert">
                                ❌ Credenciales incorrectas. Prueba con <strong>user@alke.com</strong> y contraseña <strong>123456</strong>.
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase shadow rounded-3">Ingresar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
