<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Historial de Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white fw-semibold" href="menu.html">← Volver al Menú</a>
            </div>
        </div>
    </nav>

    <div class="container animate-fade-in">
        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-lg rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                        <h3 class="fw-bold text-primary m-0">📊 Historial Completo de Transacciones</h3>
                        <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" id="clearHistoryBtn">Limpiar Historial</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Fecha / Hora</th>
                                    <th>Concepto / Detalle</th>
                                    <th>Tipo de Movimiento</th>
                                    <th class="text-end">Monto Efectuado</th>
                                </tr>
                            </thead>
                            <tbody id="transactionsTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="js/main.js"></script>
</body><script src="js/transactions.js"></script>
</html>
