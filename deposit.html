<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar Fondos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white fw-semibold" href="menu.html">← Volver al Menú</a>
            </div>
        </div>
    </nav>

    <div class="container animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg rounded-4 p-4">
                    <div class="card-body">
                        <h3 class="fw-bold text-primary mb-3 text-center">📥 Cargar Fondos</h3>
                        <div class="alert alert-secondary text-center py-2 mb-4 rounded-3">
                            Saldo Actual Disponible: <strong id="depositCurrentSaldo">$0.00</strong>
                        </div>
                        <form id="depositForm">
                            <div class="mb-4">
                                <label for="amount" class="form-label text-secondary fw-semibold">Monto a Depositar ($)</label>
                                <input type="number" class="form-control form-control-lg text-center fw-bold" id="amount" min="1" placeholder="Ej: 10000" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-3 fw-bold text-uppercase shadow rounded-3">Confirmar Depósito</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body text-center p-4">
                    <div class="fs-1 text-success mb-2">🎉</div>
                    <h4 class="fw-bold mb-2">¡Depósito Exitoso!</h4>
                    <p class="text-muted" id="modalMessage">Los fondos han sido abonados a tu saldo.</p>
                    <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
